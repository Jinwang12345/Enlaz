          default: ''
          title: Id
          type: string
        name:
          description: User first name
          title: Name
          type: string
        owner:
          default: ''
          title: Owner
          type: string
        password:
          description: User password
          format: password
          title: Password
          type: string
          writeOnly: true
        phone:
          anyOf:
          - type: string
          - type: 'null'
          description: User phone number
          title: Phone
        roles:
          default: []
          items:
            type: string
          title: Roles
          type: array
          x_frontend_relation: Role
        surnames:
          anyOf:
          - type: string
          - type: 'null'
          description: User last name
          title: Surnames
      required:
      - name
      - email
      - password
      title: User
      type: object
      x-auth: true
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    Wallet:
      properties:
        address:
          description: The wallet address
          title: Address
          type: string
          x_required: true
          x_unique: true
        balance:
          anyOf:
          - type: number
          - type: 'null'
          default: 0.0
          description: The wallet balance
          title: Balance
        currency:
          anyOf:
          - type: string
          - type: 'null'
          default: USD
          description: The wallet currency
          title: Currency
        id:
          default: ''
          title: Id
          type: string
        name:
          title: Name
          type: string
        owner:
          default: ''
          title: Owner
          type: string
        user_id:
          description: The user ID
          title: User Id
          type: string
          x_required: true
          x_type: objectId
      required:
      - name
      - address
      - user_id
      title: Wallet
      type: object
    WalletResponse:
      properties:
        balance:
          title: Balance
          type: number
        currency:
          title: Currency
          type: string
        transactions:
          items:
            additionalProperties: true
            type: object
          title: Transactions
          type: array
      required:
      - balance
      - currency
      - transactions
      title: WalletResponse
      type: object
